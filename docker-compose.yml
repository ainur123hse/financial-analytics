services:
  api:
    build: .
    image: financial-analytics:local
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL_DOCKER:-http://host.docker.internal:3000}
      MARKDOWNS_DIR: /app/markdowns
      UPLOADED_PDFS_DIR: /app/uploaded_pdfs
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - markdowns_data:/app/markdowns
      - uploaded_pdfs_data:/app/uploaded_pdfs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build: .
    image: financial-analytics:local
    restart: unless-stopped
    command: celery -A app.api.celery_app:celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL_DOCKER:-http://host.docker.internal:3000}
      MARKDOWNS_DIR: /app/markdowns
      UPLOADED_PDFS_DIR: /app/uploaded_pdfs
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - markdowns_data:/app/markdowns
      - uploaded_pdfs_data:/app/uploaded_pdfs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  markdowns_data:
  uploaded_pdfs_data:
